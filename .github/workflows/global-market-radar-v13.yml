name: 全球市場雷達 V13.5.1 + OS 3.1.1 手機版

permissions:
  contents: write

on:
  workflow_dispatch:
  schedule:
    - cron: "8 22 * * *"   # 台北隔天 06:08（UTC 22:08）
    - cron: "22 7 * * *"   # 台北當天 15:22（UTC 07:22）

concurrency:
  group: global-market-radar-v13
  cancel-in-progress: false

jobs:
  run-radar:
    timeout-minutes: 15
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run radar
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python main.py

      - name: Commit V13 state and history
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add storage/*.json storage/*.csv storage/*.jsonl 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update V13 radar state"
          git push || true
